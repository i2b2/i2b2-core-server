name: CI Pipeline

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      database_image_branch:
        description: "Database Branch name to use for running tests"
        required: true
        default: "master"
        type: string

jobs:
  build:
    name: Build & Publish i2b2-core-server image
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          echo "core_tag=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "Using tag: $core_tag"

      - name: Build and Push image
        run: |
          # Fails the script immediately if a command exits with a non-zero status
          set -e 
          
          export CORE_SERVER_TAG="$core_tag"
          export docker_username=${{ secrets.DOCKER_HOST }}
          export docker_reponame=${{ secrets.DOCKER_REPO }}
          
          cd docker/
          bash create_docker_image.sh "$CORE_SERVER_TAG"

  test:   
    name: Run DB Tests
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    
    strategy:
      fail-fast: false # Prevents one failing DB test from cancelling the others
      matrix:
        db: [mssql, pg, oracle]

    steps:
      # Checkout the target test repository directly to save time writing clone scripts
      - name: Checkout Test Repository
        uses: actions/checkout@v4
        with:
          repository: i2b2/i2b2-docker
          path: i2b2-docker

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}          
          
      - name: Run Test Cases
        run: |
          set -e
          cd i2b2-docker/${{ matrix.db }}

          export docker_username=${{ secrets.DOCKER_HOST }}
          export docker_reponame=${{ secrets.DOCKER_REPO }}

          # We can pull the ref_name dynamically or pass it from the build job outputs
          export core_tag=${{ github.ref_name }}
          echo "Running ${{ matrix.db }} test cases for tag: $core_tag"
          
          bash test_case.sh "$core_tag" ${{ inputs.database_image_branch }}